<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感謝您的訊息 ｜ 本合實業有限公司</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%231e332a'/%3E%3Ctext x='32' y='44' font-family='serif' font-size='34' font-weight='bold' text-anchor='middle' fill='%23c9a656'%3E本%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",sans-serif;color:#2b2b2b;background:#f7f2e6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
.card{max-width:560px;text-align:center;padding:60px 40px;background:#fff;border:1px solid #c8b99c;position:relative}
.card::before,.card::after{content:"";position:absolute;width:20px;height:20px}
.card::before{top:-1px;left:-1px;border-top:2px solid #c9a656;border-left:2px solid #c9a656}
.card::after{bottom:-1px;right:-1px;border-bottom:2px solid #c9a656;border-right:2px solid #c9a656}
.check{width:72px;height:72px;margin:0 auto 24px;border-radius:50%;background:#1e332a;display:flex;align-items:center;justify-content:center}
.check svg{width:36px;height:36px;stroke:#c9a656;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:36px;color:#1e332a;letter-spacing:6px;margin-bottom:16px}
.sub{font-size:13px;letter-spacing:3px;color:#9c7f3d;margin-bottom:32px}
p{line-height:1.9;color:#5a5a5a;margin-bottom:32px}
.btn{display:inline-block;padding:14px 32px;background:#1e332a;color:#f7f2e6;text-decoration:none;font-size:14px;letter-spacing:2px;transition:background .2s}
.btn:hover{background:#9c7f3d}
</style>
</head>
<body>
<div class="card">
<div class="check">
<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
</div>
<h1>訊息已送出</h1>
<div class="sub">THANK YOU FOR YOUR MESSAGE</div>
<p>
感謝您與本合實業聯絡。<br>
我們已收到您的訊息，將於 <strong>1-2 個工作天內</strong>回覆您。<br><br>
如有緊急需求，歡迎直接來電：<br>
<strong style="color:#1e332a">(04) 2463-2888</strong>
</p>
<a href="/" class="btn">返 回 首 頁</a>
</div>
</body>
</html>
